<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 背景 -->
  <rect width="100" height="100" rx="10" fill="#4ecdc4"/>
  
  <!-- 攀爬架结构 -->
  <!-- 左侧立柱 -->
  <rect x="20" y="20" width="8" height="60" fill="white"/>
  <!-- 右侧立柱 -->
  <rect x="72" y="20" width="8" height="60" fill="white"/>
  <!-- 顶部横梁 -->
  <rect x="20" y="20" width="60" height="8" fill="white"/>
  <!-- 中间横梁 -->
  <rect x="20" y="50" width="60" height="8" fill="white"/>
  <!-- 斜撑 -->
  <line x1="28" y1="28" x2="72" y2="50" stroke="white" stroke-width="4"/>
  <line x1="72" y1="28" x2="28" y2="50" stroke="white" stroke-width="4"/>
  
  <!-- 连接点 -->
  <circle cx="24" cy="24" r="4" fill="#ff6b6b"/>
  <circle cx="76" cy="24" r="4" fill="#ff6b6b"/>
  <circle cx="24" cy="54" r="4" fill="#ff6b6b"/>
  <circle cx="76" cy="54" r="4" fill="#ff6b6b"/>
  <circle cx="24" cy="76" r="4" fill="#ff6b6b"/>
  <circle cx="76" cy="76" r="4" fill="#ff6b6b"/>
  
  <!-- 文字 -->
  <text x="50" y="95" text-anchor="middle" fill="white" font-size="12" font-weight="bold">KC</text>
</svg>
