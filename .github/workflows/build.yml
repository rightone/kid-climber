name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Build Go backend
        run: |
          cd backend
          go build -o kid-climber-server.exe ./cmd/server/main.go
        shell: bash

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Update version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to: $VERSION"
          # Update package.json
          cd frontend
          sed -i'' -e "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          # Update tauri.conf.json
          cd src-tauri
          sed -i'' -e "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" tauri.conf.json
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Kid Climber ${{ github.ref_name }}'
          releaseBody: |
            # Kid Climber ${{ github.ref_name }}
            
            > 专业的攀爬架结构设计软件，支持3D可视化设计、材料预估和清单导出。
            
            ---
            
            ## 📦 下载安装包
            
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | **Windows** | `.msi` | Windows 安装包 |
            | **Windows** | `.exe` | Windows 便携版 |
            | **macOS (Intel)** | `.dmg` | macOS Intel 版本 |
            | **macOS (Apple Silicon)** | `.dmg` | macOS M1/M2 版本 |
            | **Linux** | `.deb` | Debian/Ubuntu 安装包 |
            | **Linux** | `.AppImage` | Linux 便携版 |
            | **Linux** | `.rpm` | Fedora/CentOS 安装包 |
            
            ---
            
            ## ✨ 功能特性
            
            ### 🎨 3D 可视化设计
            - 实时3D预览，支持旋转、缩放、平移
            - 拖拽式组件放置，直观易用
            - 多种视图模式（真实感、线框、X光、黑白）
            - 网格显示和组件吸附
            - 立体参考线系统
            
            ### 🧩 丰富的组件库
            - **管件**: 35cm、15cm 直管
            - **接头**: 一字、L型、T型、45度、三向、四向、十字、五向
            - **板子**: 40×40cm、40×20cm
            - **附件**: 秋千、滑梯、绳梯
            
            ### 📊 材料管理
            - 自动计算材料需求
            - 库存管理和短缺统计
            - 连接损耗计算
            - 成本预估
            
            ### 🔍 结构分析
            - 稳定性检查
            - 连接分析
            - 支撑检查
            - 平衡分析
            
            ### 🔗 智能连接
            - 自动连接检测
            - 连接点可视化
            - 智能位置预测
            
            ### 📁 文件管理
            - 设计文件保存/加载
            - 多格式导出（PNG、OBJ、GLTF）
            - 材料清单打印
            
            ### ⌨️ 快捷键支持
            - Ctrl+Z/Y：撤销/重做
            - Ctrl+C/V：复制/粘贴
            - V/M/R：工具切换
            - 1/2/3/4：视图模式切换
            
            ---
            
            ## 🛠️ 技术栈
            
            | 层级 | 技术 |
            |------|------|
            | 前端 | React 18 + TypeScript + Three.js |
            | 状态管理 | Zustand |
            | UI组件 | Ant Design |
            | 后端 | Go + Gin + SQLite |
            | 桌面 | Tauri 2.0 |
            
            ---
            
            ## 📖 使用说明
            
            1. 下载并安装对应平台的安装包
            2. 启动应用程序
            3. 从左侧组件库选择组件
            4. 在3D视图中点击放置组件
            5. 使用工具栏调整组件位置和旋转
            6. 保存或导出设计
            
            ---
            
            ## 🐛 问题反馈
            
            如有问题或建议，请提交 [Issue](https://github.com/${{ github.repository }}/issues)
            
            ---
            
            **感谢使用 Kid Climber！** 🎉
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
